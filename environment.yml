name: gufe
channels:
  - conda-forge
dependencies:
  - annotated-types
  - coverage
  - msgpack-python
  - networkx
  - numpy
  - openff-toolkit-base >=0.15.1
  - openff-units >=0.3.1
  - openmm
  - pint
  - pip
  - pooch >= 1.9.0  # min needed for https://github.com/fatiando/pooch/issues/502
  - py3dmol  # opt
  - pydantic >=2.0, <2.12
  - pytest
  - pytest-cov
  - pytest-xdist
  - rdkit>=2024.09.1  # github.com/OpenFreeEnergy/gufe/issues/664
  - typing-extensions
  - ipywidgets  # opt
  - zstandard
  - pip:
    - git+https://github.com/openforcefield/openff-units/@define-pydantic-schema
    - git+https://github.com/openforcefield/openff-interchange/@fix-pydantic
    - pydantic==2.13.*
